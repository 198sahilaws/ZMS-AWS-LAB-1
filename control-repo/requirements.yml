---
# Collections the control node needs. Installed by bootstrap.yml into ./collections
# (matching collections_path in ansible.cfg):
#   ansible-galaxy collection install -r requirements.yml -p collections
collections:
  - name: amazon.aws          # aws_ec2 inventory plugin + aws_secret lookup
  - name: ansible.windows     # win_* core modules
  - name: community.windows   # extended Windows modules
  - name: chocolatey.chocolatey
  - name: ansible.posix
  - name: community.general
