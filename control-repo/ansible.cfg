[defaults]
inventory            = inventory/aws_ec2.yml
roles_path           = roles
collections_path     = collections
# Ephemeral cloud hosts churn keys.
host_key_checking    = False
retry_files_enabled  = False
# Ample for a few-dozen-host estate.
forks                = 20
interpreter_python   = auto_silent
stdout_callback      = yaml
callbacks_enabled    = profile_tasks
fact_caching         = jsonfile
fact_caching_connection = /var/tmp/ansible_facts
fact_caching_timeout = 3600
# Persistent run log (in addition to journald). Every ansible-playbook run is
# appended here; the dir is created by the control node's cloud-init.
log_path                = /var/log/ansible/ansible.log

[inventory]
# Nothing else needed for AWS.
enable_plugins = aws_ec2

[connection]
# NOTE: pipelining must live under [connection] (or [defaults]); ansible-core
# 2.16+ no longer reads it from [ssh_connection]. Biggest Linux push speedup;
# requires requiretty OFF in the managed hosts' sudoers (default on cloud images).
pipelining    = True

[ssh_connection]
ssh_args      = -o ControlMaster=auto -o ControlPersist=60s
control_path  = /tmp/ansible-%%r@%%h:%%p

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
