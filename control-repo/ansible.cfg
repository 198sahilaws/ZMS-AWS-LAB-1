[defaults]
inventory               = inventory/aws_ec2.yml
roles_path              = roles
collections_path        = collections
# Ephemeral cloud hosts churn host keys.
host_key_checking       = False
retry_files_enabled     = False
forks                   = 20
# AL2023 + Ubuntu both ship python3.
interpreter_python      = auto_silent
stdout_callback         = yaml
callbacks_enabled       = profile_tasks
fact_caching            = jsonfile
fact_caching_connection = /var/tmp/ansible_facts
fact_caching_timeout    = 3600

[inventory]
enable_plugins = aws_ec2

[ssh_connection]
ssh_args     = -o ControlMaster=auto -o ControlPersist=60s
# Big speedup; needs requiretty off in the managed hosts' sudoers (default on cloud images).
pipelining   = True
# %% escapes a literal % for configparser.
control_path = /tmp/ansible-%%r@%%h:%%p

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
