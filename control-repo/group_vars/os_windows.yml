---
# Connection settings for all Windows hosts (group os_windows from the OS tag).
# WinRM over HTTPS (5986), enabled by the Terraform Windows user-data.
ansible_connection: winrm
ansible_port: 5986
ansible_winrm_transport: ntlm
# The listener uses a self-signed cert and we connect by private IP, so the cert
# CN never matches — ignore validation (acceptable for this lab; use "validate"
# with a trusted/ACM-issued cert in production).
ansible_winrm_server_cert_validation: ignore

# WinRM credential resolved at run time from Secrets Manager, using the secret
# name Terraform injected (option D). The secret holds {"username","password"}.
winrm_creds: "{{ lookup('amazon.aws.aws_secret', ansible_winrm_secret_name, region=aws_region) | from_json }}"
ansible_user: "{{ winrm_creds.username }}"
ansible_password: "{{ winrm_creds.password }}"
