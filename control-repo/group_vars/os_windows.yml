---
# Connection settings for the Windows estate (group 'os_windows', keyed off tag OS).
ansible_connection: winrm
ansible_port: 5986                # HTTPS listener from Document 1 §7
ansible_winrm_transport: ntlm     # 'kerberos' if domain-joined; see §6
ansible_winrm_server_cert_validation: validate   # 'ignore' only for self-signed
ansible_winrm_message_encryption: auto           # encrypt payload over NTLM/HTTP

# Credentials come from the single consolidated secret resolved in
# group_vars/all.yml (ansible_credentials). Nothing sensitive is stored in Git;
# ansible_password is automatically scrubbed from Ansible output/logs.
ansible_user: "{{ ansible_credentials.winrm_username }}"
ansible_password: "{{ ansible_credentials.winrm_password }}"
