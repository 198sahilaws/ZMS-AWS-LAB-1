---
# Build-time Secrets Manager handoff (option D).
# Terraform's user-data wrote the resolved region + secret names/ARNs to
# /etc/ansible/secret_vars.yml on the control node. Playbooks load that file
# (via vars_files), so these are just fallbacks for lint / off-host syntax checks.
aws_region: "{{ lookup('env', 'AWS_REGION') | default('eu-west-3', true) }}"
# One consolidated secret per deployment; its value is a JSON document:
#   { ssh_private_key, winrm_username, winrm_password, provision_key }
# Access any field as ansible_credentials.<field> (e.g. ansible_credentials.provision_key).
ansible_secret_name: ""
ansible_secret_arn: ""

# Resolve the consolidated secret once; SSH and WinRM both read fields from it.
ansible_credentials: "{{ lookup('amazon.aws.aws_secret', ansible_secret_name, region=aws_region) | from_json if ansible_secret_name | length > 0 else {} }}"

# The Ansible SSH key is fetched from the secret by bootstrap.yml and written here
# (RSA 4096, generated by the Terraform keypair module).
ansible_ssh_private_key_file: /etc/ansible/keys/ansible.pem

# Internal repo served from the control node's private DNS alias.
internal_repo_base: "http://repo.alcor.co.in"
