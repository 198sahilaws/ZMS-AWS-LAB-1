---
# Baseline role. OS-agnostic entry point that dispatches to the per-OS task
# file. Hosts are already split into os_linux / os_windows groups by the
# inventory, but dispatching here keeps the role usable on either play.
- name: Include Linux baseline tasks
  ansible.builtin.include_tasks: linux.yml
  when: ansible_os_family != "Windows"

- name: Include Windows baseline tasks
  ansible.builtin.include_tasks: windows.yml
  when: ansible_os_family == "Windows"
