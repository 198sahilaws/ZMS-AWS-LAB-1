---
# Minimal, idempotent Windows baseline.
# Prefer signed installers / signed Chocolatey packages over large custom
# PowerShell on hardened hosts (WDAC / AppLocker / Constrained Language Mode).
- name: Set the timezone
  community.windows.win_timezone:
    timezone: "{{ baseline_windows_timezone }}"

- name: Ensure baseline Chocolatey packages are present
  chocolatey.chocolatey.win_chocolatey:
    name: "{{ baseline_windows_packages }}"
    state: present
  when: baseline_windows_packages | length > 0
