---
# Install MySQL and run it as a service on SELECTED Amazon Linux servers.
#
#   ansible-playbook playbooks/amazonlinux-mysql.yml --limit db01
#   ansible-playbook playbooks/amazonlinux-mysql.yml -e target=role_db
#
# Amazon Linux 2023 (EL9-based) does not ship MySQL in its core repos, so this
# adds the official MySQL Community repo, then installs mysql-community-server
# (service 'mysqld'). Point mysql_repo_rpm at an internal mirror if preferred.
#
# Alternative: if MariaDB (a MySQL-compatible drop-in) is acceptable, install
# 'mariadb105-server' instead (service 'mariadb') — no external repo needed.
#
# NOTE: MySQL Community generates a TEMPORARY root password in /var/log/mysqld.log
# on first start. Setting a new root password non-interactively requires that
# temp password, so the optional root step below is best-effort and disabled by
# default. For greenfield automation many teams prefer MariaDB for this reason.

- name: Install and enable MySQL
  hosts: "{{ target | default('os_linux') }}"
  gather_facts: true
  vars:
    mysql_repo_rpm: "https://dev.mysql.com/get/mysql84-community-release-el9-1.noarch.rpm"
    # MySQL's current RPM signing key; point at an internal mirror if preferred.
    mysql_gpg_key: "https://repo.mysql.com/RPM-GPG-KEY-mysql-2023"
    # Root password from the single consolidated secret (group_vars/all.yml ->
    # ansible_credentials). Empty (default) skips the root-password step.
    mysql_root_password: "{{ ansible_credentials.mysql_root_password | default('', true) }}"
  tasks:
    - name: Skip non-RedHat-family hosts
      ansible.builtin.meta: end_host
      when: ansible_os_family != "RedHat"

    - name: Import the MySQL GPG signing key (so the release RPM is verified)
      ansible.builtin.rpm_key:
        key: "{{ mysql_gpg_key }}"
        state: present

    - name: Install the MySQL Community repository
      ansible.builtin.dnf:
        name: "{{ mysql_repo_rpm }}"
        state: present

    - name: Install MySQL Community server and the Python client
      ansible.builtin.dnf:
        name:
          - mysql-community-server
          - python3-PyMySQL
        state: present

    - name: Ensure mysqld is started and enabled at boot
      ansible.builtin.service:
        name: mysqld
        state: started
        enabled: true

    - name: Set the MySQL root password (optional; see note above)
      community.mysql.mysql_user:
        name: root
        password: "{{ mysql_root_password }}"
        host: localhost
        login_unix_socket: /var/lib/mysql/mysql.sock
        state: present
      no_log: true
      when: mysql_root_password | length > 0
