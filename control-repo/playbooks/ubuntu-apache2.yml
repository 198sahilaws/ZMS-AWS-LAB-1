---
# Install Apache2 and run it as a service on SELECTED Ubuntu servers.
#
#   ansible-playbook playbooks/ubuntu-apache2.yml --limit web01,web02
#   ansible-playbook playbooks/ubuntu-apache2.yml -e target=role_web

- name: Install and enable Apache2
  hosts: "{{ target | default('os_linux') }}"
  gather_facts: true
  tasks:
    - name: Skip non-Debian hosts
      ansible.builtin.meta: end_host
      when: ansible_os_family != "Debian"

    - name: Install Apache2
      ansible.builtin.apt:
        name: apache2
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure Apache2 is started and enabled at boot
      ansible.builtin.service:
        name: apache2
        state: started
        enabled: true
