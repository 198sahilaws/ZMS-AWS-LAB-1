---
# Install MySQL and run it as a service on SELECTED Ubuntu servers.
#
#   ansible-playbook playbooks/ubuntu-mysql.yml --limit db01
#   ansible-playbook playbooks/ubuntu-mysql.yml -e target=role_db
#
# By default this installs MySQL and ensures the service is running/enabled.
# To also set the root password, pass it in (ideally from Secrets Manager):
#   -e mysql_root_password="$(...)"
# or uncomment the lookup below. On a fresh Ubuntu install the root account
# uses auth_socket, so the local socket connection works without a password.

- name: Install and enable MySQL
  hosts: "{{ target | default('os_linux') }}"
  gather_facts: true
  vars:
    # Optional: fetch the root password from Secrets Manager at run time.
    # mysql_root_password: "{{ lookup('amazon.aws.aws_secret',
    #                          'ansible-control/mysql-root-password', region=aws_region) }}"
    mysql_root_password: ""
  tasks:
    - name: Skip non-Debian hosts
      ansible.builtin.meta: end_host
      when: ansible_os_family != "Debian"

    - name: Install MySQL server and the Python client (for Ansible mysql modules)
      ansible.builtin.apt:
        name:
          - mysql-server
          - python3-pymysql
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure MySQL is started and enabled at boot
      ansible.builtin.service:
        name: mysql
        state: started
        enabled: true

    - name: Set the MySQL root password (optional)
      community.mysql.mysql_user:
        name: root
        password: "{{ mysql_root_password }}"
        host: localhost
        login_unix_socket: /run/mysqld/mysqld.sock
        state: present
      no_log: true
      when: mysql_root_password | length > 0
